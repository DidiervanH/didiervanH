name: Check Links

on:
  push:
    branches: [main]
    paths: [README.md]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check links
        run: bun run check-links
